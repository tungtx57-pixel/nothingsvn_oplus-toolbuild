name: NothingsVN Oplus ROM Build

on:
  workflow_dispatch:
    inputs:
      input_url:
        description: 'URL of the ROM to build'
        required: true
      kaorios_toolbox:
        description: 'Install KaoriOS toolbox to ROM?'
        required: true
        type: boolean
        default: true
      install_mods:
        description: 'Install mods to ROM?'
        required: true
        type: boolean
        default: true
      
jobs:
  Initialize:
    runs-on: ubuntu-latest
    steps:
      - name: Clean All Unused file,application
        run: |
          docker rmi `docker images -q` || true
          sudo rm -rf /usr/share/dotnet /etc/mysql /etc/php /etc/sudo apt/sources.list.d || true
          sudo apt -y purge azure-cli ghc* zulu* hhvm llvm* firefox google* dotnet* powershell mysql* php* || true
          sudo apt -y autoremove --purge || true
          sudo apt -y autoclean || true
          sudo apt clean || true

      - name: Maximize build space
        uses: easimon/maximize-build-space@master
        with:
          swap-size-mb: 1024
          root-reserve-mb: 512
          remove-dotnet: 'true'
          remove-android: 'true'
          remove-haskell: 'true'

      - name: Set up Time
        run: |
          echo "Setting Vienam timezone"
          sudo timedatectl set-timezone Asia/Ho_Chi_Minh

  Build:
    needs: Initialize
    runs-on: ubuntu-latest
    steps:
      - name: Install Stuff
        run: |
          sudo add-apt-repository -y ppa:ubuntu-toolchain-r/test 
          sudo apt-get update
          sudo apt-get install -y aria2 jq rclone sshpass python-is-python3 wget python3 lz4 xz-utils device-tree-compiler zlib1g-dev gcc g++ libc6 libstdc++6 python3-pip dialog libgtk-3-dev aapt busybox zip erofs-utils unzip p7zip-full zipalign zstd bc android-sdk-libsparse-utils xmlstarlet
          sudo pip3 install ConfigObj
          sudo pip3 install telebot
          sudo pip3 install setuptools

      - name: Install OpenJDK
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Checkout repository
        uses: actions/checkout@main
        
      - name: Giving permission
        run: |
          sudo chmod 777 -R *

      - name: Get environment Toolbox boolean before install...
        if: ${{ inputs.kaorios_toolbox }} == 'true'
        run: |
          echo "install_toolbox=true"
        else:
          echo "install_toolbox=false"
          
      - name: Get environment Mods boolean before install...
        if: ${{ inputs.install_mods }} == 'true'
        run: |
          echo "install_mods=true"
        else:
          echo "install_mods=false"
          
      - name: Build ROM...
        env:
          INPUT_URL: ${{ inputs.input_url }}
        run: |
          sudo bash build.sh "$INPUT_URL"

      - name: Pack ROM...
        run: |
          sudo bash packROM.sh n

      - name: Setup Rclone...
        run: |
          sudo -E bash uploadROM.sh setup "${{ secrets.GH_TOKEN }}" "${{ secrets.GH_REPO }}" "${{ secrets.RCLONE_TOKEN_PATH }}"
          
      - name: Upload ROM...
        run: |
          sudo -E bash uploadROM.sh
      
      - name: Update Database and Notificaton to Telegram
        env:
          TELEGRAM_TOKEN: ${{ secrets.TG_TOKEN }}
        run: |
          