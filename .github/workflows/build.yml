name: NothingsVN Oplus ROM Build

on:
  workflow_dispatch:
    inputs:
      input_url:
        description: 'URL of the ROM to build'
        required: true

jobs:
  Setup-Build-environment:
    runs-on: ubuntu-latest
    steps:
      - name: Clean All Unused file,application
        run: |
          docker rmi `docker images -q` || true
          sudo rm -rf /usr/share/dotnet /etc/mysql /etc/php /etc/sudo apt/sources.list.d || true
          sudo apt -y purge azure-cli ghc* zulu* hhvm llvm* firefox google* dotnet* powershell mysql* php* || true
          sudo apt -y autoremove --purge || true
          sudo apt -y autoclean || true
          sudo apt clean || true

      - name: Maximize build space
        uses: easimon/maximize-build-space@master
        with:
          swap-size-mb: 1024
          root-reserve-mb: 512
          remove-dotnet: 'true'
          remove-android: 'true'
          remove-haskell: 'true'

      - name: Set up Time
        run: |
          echo "Setting Vienam timezone"
          sudo timedatectl set-timezone Asia/Ho_Chi_Minh

      - name: Install Stuff
        run: |
          sudo add-apt-repository -y ppa:ubuntu-toolchain-r/test 
          sudo apt-get update
          sudo apt-get install -y aria2 jq rclone sshpass python-is-python3 wget python3 lz4 xz-utils device-tree-compiler zlib1g-dev gcc g++ libc6 libstdc++6 python3-pip dialog libgtk-3-dev aapt busybox zip erofs-utils unzip p7zip-full zipalign zstd bc android-sdk-libsparse-utils xmlstarlet
          sudo pip3 install ConfigObj
          sudo pip3 install telebot
          sudo pip3 install setuptools

      - name: Install OpenJDK
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

  Build-and-Upload:
    runs-on: ubuntu-latest
    needs: Setup-Build-environment
    steps:
      - name: Checkout repository
        uses: actions/checkout@main
        
      - name: Giving permission
        run: |
          sudo chmod 777 -R *
        
      - name: Build ROM...
        env:
          INPUT_URL: ${{ inputs.input_url }}
        run: |
          sudo bash build.sh "$INPUT_URL"

      - name: Pack ROM...
        run: |
          sudo bash packROM.sh n
      
      - name: Upload ROM...
        env:
          ONEDRIVE_TOKEN: ${{ secrets.RCLONE_TOKEN }}
        run: |
          echo -n "${{ secrets.RCLONE_TOKEN }}" | base64 -d > $work_dir/rclone
          sudo bash uploadROM.sh
      
      - name: Update Database and Notificaton to Telegram
        env:
          TELEGRAM_TOKEN: ${{ secrets.TG_TOKEN }}
        run: |
          